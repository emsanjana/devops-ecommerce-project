version: '3.9'

services:

  postgres:
    image: postgres
    container_name: ecommerce-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ecommerce
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    container_name: ecommerce-backend
    ports:
      - "5000:5000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: admin
      DB_PASSWORD: password
      DB_NAME: ecommerce
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    container_name: ecommerce-frontend
    ports:
      - "3000:5173"
    depends_on:
      - backend
